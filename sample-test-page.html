<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>AI Fill Extension Test Page</title>
    <link rel="icon" href="data:,">
    <style>
      :root {
        color-scheme: light;
        font-family: "Segoe UI", system-ui, sans-serif;
      }

      body {
        margin: 0;
        background: linear-gradient(180deg, #f3f6fb 0%, #ffffff 100%);
        color: #18212b;
      }

      .page {
        max-width: 760px;
        margin: 48px auto;
        padding: 0 20px 48px;
      }

      .card {
        background: #ffffff;
        border: 1px solid #d9e2ec;
        border-radius: 18px;
        box-shadow: 0 18px 50px rgba(15, 23, 42, 0.08);
        padding: 28px;
      }

      h1 {
        margin-top: 0;
        margin-bottom: 8px;
        font-size: 32px;
      }

      p.intro {
        margin-top: 0;
        margin-bottom: 28px;
        color: #52606d;
      }

      .field-group {
        margin-bottom: 22px;
      }

      label,
      .field-question {
        display: block;
        margin-bottom: 8px;
        font-weight: 600;
      }

      input,
      textarea {
        width: min(100%, 520px);
        padding: 10px 12px;
        border: 1px solid #bcccdc;
        border-radius: 10px;
        font: inherit;
        box-sizing: border-box;
      }

      textarea {
        min-height: 110px;
        resize: vertical;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
        gap: 18px;
      }
    </style>
  </head>
  <body>
    <main class="page">
      <section class="card">
        <h1>Application Form</h1>
        <p class="intro">Use this page to test the AI Fill Chrome extension against common field types and fallback cases.</p>

        <form>
          <div class="grid">
            <div class="field-group">
              <label for="full-name">Name</label>
              <input id="full-name" type="text" autocomplete="off">
            </div>

            <div class="field-group">
              <label for="email-address">Email</label>
              <input id="email-address" type="email" autocomplete="off">
            </div>
          </div>

          <div class="field-group">
            <label for="phone-number">Phone</label>
            <input id="phone-number" type="tel" autocomplete="off">
          </div>

          <div class="field-group">
            <label for="job-interest">Why do you want this job?</label>
            <textarea id="job-interest"></textarea>
          </div>

          <div class="field-group">
            <label for="experience">Describe your experience</label>
            <textarea id="experience"></textarea>
          </div>

          <div class="field-group">
            <div class="field-question">What is your expected salary?</div>
            <input type="text" autocomplete="off">
          </div>

          <div class="field-group">
            <input type="text" placeholder="Portfolio website" autocomplete="off">
          </div>

          <div class="field-group">
            <div class="field-question">Anything else you want the hiring team to know?</div>
            <textarea></textarea>
          </div>
        </form>
      </section>
    </main>
  </body>
</html>
